configs:
  JWT_SECRET:
    external: true
  MONGODB_URI:
    external: true

services:
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - MONGODB_URI_FILE=/run/secrets/MONGODB_URI
      - JWT_SECRET_FILE=/run/secrets/JWT_SECRET
      - PORT=5000
    configs:
      - JWT_SECRET
      - MONGODB_URI
    depends_on:
      - mongodb
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://server:5000
    depends_on:
      - server
    restart: unless-stopped

  mongodb:
    image: mongo:latest
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=cricket-booking
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

volumes:
  mongodb_data:
